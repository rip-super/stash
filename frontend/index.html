<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>stash - encrypted personal file storage</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="container">
        <h1 class="wordmark"><img src="stash.png" alt="stash logo" height="200px"></h1>
        <p class="descriptor">encrypted personal file storage</p>

        <div class="actions">
            <button type="button" class="action">create stash</button>
            <button type="button" class="action">join a stash</button>
        </div>

        <p class="tagline">
            <span>No accounts</span>
            <span class="bullet">&#9679;</span>
            <span>No plaintext</span>
            <span class="bullet">&#9679;</span>
            <span>No exceptions</span>
        </p>

        <footer class="footer">
            <a href="https://www.sahildash.dev" target="_blank">Built by Sahil Dash</a>
            <span class="bullet">&#9679;</span>
            <a href="https://github.com/rip-super/stash" target="_blank">Star on GitHub</a>
        </footer>
    </main>

    <script src="core.js"></script>
    <script src="script.js"></script>
</body>

</html>
